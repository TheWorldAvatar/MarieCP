# Snippet for www.theworldavatar.io — proxy demo paths to MarieCP on zaha-01.
# Adjust upstream host if Flask runs on a different machine.

upstream mariecp_demo {
    server 127.0.0.1:8080;
}

# Demo hub picker
location = /demos {
    return 302 /demos/hub/;
}

location /demos/hub/ {
    proxy_pass http://mariecp_demo;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Zaha static + QA/chat API
location /demos/zaha/ {
    proxy_pass http://mariecp_demo;
    proxy_read_timeout 300s;
    proxy_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Marie classic static + QA/chat API
location /demos/marie-classic/ {
    proxy_pass http://mariecp_demo;
    proxy_read_timeout 300s;
    proxy_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Marie search / explore APIs (cache-backed GET endpoints)
location /demos/marie/api/ {
    proxy_pass http://mariecp_demo;
    proxy_read_timeout 300s;
    proxy_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# No Next.js — legacy links land on classic UI
location /demos/marie/ {
    return 302 /demos/marie-classic/;
}
