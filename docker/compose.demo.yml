# MarieCP public demo stack (isolated project — safe alongside other compose stacks).
#
# Run from repo root:
#   docker compose -f docker/compose.demo.yml -p mariecp-demo up --build
#
# Project directory is docker/ (avoids loading a broken repo-root .env).

name: mariecp-demo

services:
  mariecp-demo:
    env_file:
      - ../.env
    build:
      context: ..
      dockerfile: docker/demo/Dockerfile
    image: mariecp-demo:local
    container_name: mariecp-demo
    restart: unless-stopped
    ports:
      - "${MARIECP_PUBLISH_HOST:-0.0.0.0}:${MARIECP_PORT:-3001}:8080"
    environment:
      PYTHONPATH: /app
      DEMO_CONFIG: docker
      MINI_MARIE_DATA_DIR: /data
      MARIE_FRONTEND_PROXY: "0"
      DEMO_AUTO_OFFLINE: "${DEMO_AUTO_OFFLINE:-true}"
      DEMO_FORCE_REFRESH: "${DEMO_FORCE_REFRESH:-false}"
      DEMO_MIRROR_ON_START: "${DEMO_MIRROR_ON_START:-1}"
      DEMO_LLM_MODEL: "${DEMO_LLM_MODEL:-gpt-4o}"
      FLASK_SECRET_KEY: "${FLASK_SECRET_KEY:-dev-secret}"
    volumes:
      - ${MARIECP_DATA:-../data}:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
